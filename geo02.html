<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <style>
    #map {
      height: 500px;
    }
  </style>
  <title>Geolocation API 01</title>
</head>

<body>
  <div class="container my-3">
    <h1>Geolocation API 02</h1>
    <p id="output"></p>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const output = document.querySelector("#output");
    const mapElm = document.querySelector("#map");
    const map = L.map(mapElm).setView([23.6978, 120.9605], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    getGeolocation();

    function getGeolocation() {
      if (!navigator.geolocation) {
        // 沒支援
        output.innerHTML = "沒支援"
        return;
      }
      // 有支援
      output.innerHTML = "正在嘗試取得地理位置中..."
      navigator.geolocation.getCurrentPosition(
        (position) => {
          // position.coords.latitude
          // position.coords.longitude
          // position.coords.accuracy
          let { latitude, longitude, accuracy } = position.coords;
          latitude = 24.9856269
          longitude = 121.2206126
          output.innerHTML = `你的位置：<br><br>
                    緯度：${latitude}<br>
                    經度：${longitude}<br>
                    精確度：${accuracy}
                    `;
          map.setView([latitude, longitude], 15);
          L.marker([latitude, longitude])
            .addTo(map)
            .bindPopup(`你的位置：<br>緯度：${latitude}<br>經度：${longitude}<br>`)
            .openPopup();
        },
        (error) => {
          switch (error.code) {
            case error.PERMISSION_DENIED:
              output.textContent = '使用者拒絕提供位置資訊。';
              break;
            case error.POSITION_UNAVAILABLE:
              output.textContent = '無法取得位置資訊。';
              break;
            case error.TIMEOUT:
              output.textContent = '取得位置資訊逾時。';
              break;
            default:
              output.textContent = '發生未知錯誤。';
          }
        }
      );
    }
  </script>
</body>

</html>
