<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Clipboard API</title>
</head>

<body>
    <div class="container my-3">
        <div class="editor border p-1 rounded">
            我真我有差不多小孩保密整個手機整體財經，文檔尚未文化，翻譯連續眾人介紹交友穩定新技術快捷不好指定，春節考試主機大聲出席採購，也會站點兄弟快樂傳輸在他然後你能恢復優化例如治理報導，幹部夥伴碩士眼前半年，專欄專輯一體崗位之處動畫下載，期間緩緩，運行刷新先進教育，北方格式，亞洲怎麼樣，招聘超級跟我超過提交成本常常永遠律師顯示同志反對爆炸，地上正是利用唱片轉載發表都要寫作學院基礎郵箱，絶對簡介他就，國外。
        </div>
        <div class="d-flex">
            <button class="btn btn-primary ms-auto btn-copy">複製</button>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        const btnCopy = document.querySelector(".btn-copy");
        const editor = document.querySelector(".editor");

        btnCopy.addEventListener("click", async function () {
            const text = editor.innerText;
            await navigator.clipboard.writeText(text);
        });
    </script>
</body>

</html>
