<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .img1 {
            width: 100%;
            max-width: 700px;
        }

        .img2:fullscreen {
            width: 1000px;
            max-width: initial;
        }
    </style>
    <title>fullscreen API 01</title>
</head>

<body>
    <div class="container my-3">
        <button class="btn btn-primary btn-full">進入全螢幕</button>
        <p>
            目前狀態：<span class="status">一般模式</span>
        </p>

        <div class="border rounded p-1" id="full1">
            <img class="img1" src="https://images.pexels.com/photos/35909414/pexels-photo-35909414.jpeg" alt="">
            <button class="btn btn-primary btn-full">進入全螢幕</button>
        </div>

        <div class="card" id="full2">
            <div class="card-header">
                <h1 class="fw-bold">全球經濟能源簡報</h1>
            </div>
            <div class="card-body">
                <img class="img1 img2" src="https://images.pexels.com/photos/35909414/pexels-photo-35909414.jpeg"
                    alt="">
            </div>
            <div class="card-footer d-flex">
                <button class="btn btn-primary btn-full ms-auto">進入全螢幕</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        const btnFulls = document.querySelectorAll(".btn-full");
        const status = document.querySelector(".status");

        btnFulls[0].addEventListener("click", () => {
            if (isFullscreen()) {
                // 離開
                document.exitFullscreen();
            } else {
                // 進入
                document.documentElement.requestFullscreen();
            }
        });

        btnFulls[1].addEventListener("click", () => {
            if (isFullscreen()) {
                // 離開
                document.exitFullscreen();
            } else {
                // 進入
                const elm = document.querySelector("#full1");
                elm.requestFullscreen();
            }
        });

        btnFulls[2].addEventListener("click", () => {
            if (isFullscreen()) {
                // 離開
                document.exitFullscreen();
            } else {
                // 進入
                const elm = document.querySelector("#full2");
                elm.requestFullscreen();
            }
        });

        document.addEventListener("fullscreenchange", () => {
            if (isFullscreen()) {
                // 離開
                btnFulls.forEach(btn => {
                    btn.textContent = "離開全螢幕";
                    btn.classList.add("btn-danger");
                });
                status.textContent = "全螢幕模式";
            } else {
                // 進入
                btnFulls.forEach(btn => {
                    btn.textContent = "進入全螢幕";
                    btn.classList.remove("btn-danger");
                });
                status.textContent = "一般模式";
            }
        });

        function isFullscreen() {
            return !!document.fullscreenElement
        }
    </script>
</body>

</html>
