<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>valueMissing</title>
</head>

<body>
    <div class="container my-3">
        <form action="" novalidate>
            <div class="input-group">
                <span class="input-group-text">姓名</span>
                <input type="text" class="form-control" autofocus required>
            </div>
            <div class="error-text text-danger small d-none">錯誤訊息</div>
            <div class="d-flex mt-3">
                <button type="submit" class="btn btn-primary ms-auto">送出</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        const form = document.querySelector("form");
        const input = document.querySelector("input");
        const errorText = document.querySelector(".error-text");

        form.addEventListener("submit", (e) => {
            e.preventDefault();
        });

        input.addEventListener("input", (e) => {
            let msg = "";
            if (e.target.validity.valueMissing) msg = "請輸入你的姓名哦!?"
            e.target.setCustomValidity(msg);
            e.target.reportValidity();
            errorText.textContent = msg;
            errorText.classList.toggle("d-none", msg === "");
        });
    </script>
</body>

</html>
